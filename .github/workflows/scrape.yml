name: Scrape Supercars Standings

on:
  # Run daily at 3am Brisbane time (UTC+10 = 17:00 UTC previous day)
  schedule:
    - cron: '0 17 * * *'

  # Allow manually triggering a run from the GitHub Actions tab
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml

      - name: Run scraper
        run: python scraper.py

      - name: Commit updated standings file
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add sc_championship_standing.json sc_championship_standing.php
          # Only commit if the file actually changed
          git diff --staged --quiet || git commit -m "Update standings [$(date '+%Y-%m-%d')]"
          git push
